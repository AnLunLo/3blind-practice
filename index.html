<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLD Trainer · 3×3 盲解練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Crimson+Pro:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090909;--bg2:#0e0e0e;--bg3:#141414;
  --border:#1e1e1e;--border2:#2a2a2a;
  --gold:#e2c97e;--gold2:#c9a227;
  --text:#d0d0d0;--muted:#666;--muted2:#444;
  --green:#4caf50;--red:#e63946;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:opacity .15s,transform .1s}
button:active{transform:scale(.97)}
input{font-family:'Noto Sans TC',sans-serif;outline:none}
#app{max-width:640px;margin:0 auto}

header{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
header h1{font-family:'Crimson Pro',serif;font-size:22px;color:var(--gold);letter-spacing:.5px}
header .sub{font-size:10px;color:var(--muted2);margin-top:2px}

nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:40}
.nav-btn{flex:1;padding:10px 6px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-family:'Space Mono',monospace;transition:color .15s,border-color .15s}
.nav-btn .icon{font-size:14px;display:block;margin-bottom:2px}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
main{padding:20px 16px}

/* ── Recognition ── */
.quiz-wrap{text-align:center;padding-top:8px}
.stats-bar{display:flex;justify-content:flex-end;gap:16px;margin-bottom:24px}
.stat-c{color:var(--green);font-size:13px}
.stat-w{color:var(--red);font-size:13px}

.prompt-label{color:var(--muted2);font-size:11px;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.zhuyin-pair{font-size:72px;color:var(--gold);line-height:1;margin-bottom:32px;font-family:'Noto Sans TC',sans-serif;letter-spacing:4px}

.word-input{
  display:block;margin:0 auto 8px;
  width:220px;padding:14px 16px;
  text-align:center;font-size:22px;
  background:var(--bg3);border:2px solid var(--border2);
  border-radius:12px;color:#fff;
  transition:border-color .2s,color .2s;
}
.word-input:focus{border-color:#444}
.word-input.correct{border-color:var(--green);color:var(--green)}
.word-input.wrong{border-color:var(--red);color:var(--red)}

.result-area{min-height:32px;margin:12px 0 20px;font-size:18px}
.result-correct{color:var(--green)}
.result-wrong{color:var(--red)}
.result-answer{color:var(--gold);font-weight:700}
.result-note{color:var(--muted);font-size:13px;margin-top:4px}

.btn-confirm{padding:12px 44px;background:var(--gold);color:#000;border:none;border-radius:9px;font-weight:700;font-size:16px}
.btn-confirm:disabled{opacity:.3;cursor:default}
.btn-next{padding:12px 44px;background:var(--gold);color:#000;border:none;border-radius:9px;font-weight:700;font-size:16px}

.no-memo-note{color:var(--muted2);font-size:12px;margin-top:8px}

/* ── Memo ── */
.btn-primary{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:700;font-size:15px;font-family:'Space Mono',monospace}
.btn-danger{background:var(--red);color:#fff;width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;font-size:15px}
.timer-box{background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;border:1px solid var(--border)}
.timer-label{color:var(--muted2);font-size:11px;margin-bottom:4px}
.timer-value{color:var(--gold);font-size:48px;font-family:'Space Mono',monospace;font-weight:700}
.seq-label{color:#999;font-size:12px;margin-bottom:8px}
.pair-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.pair-card{background:var(--bg3);border-radius:8px;padding:8px 14px;text-align:center;min-width:68px;border:1px solid var(--border)}
.pair-zh{font-size:17px;color:var(--gold);letter-spacing:3px;margin-bottom:3px}
.pair-word{color:var(--muted);font-size:11px}
.memo-input-wrap{margin-bottom:14px}
.memo-input-label{color:#999;font-size:12px;display:block;margin-bottom:5px}
.memo-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:#fff;font-size:20px;padding:12px 14px;letter-spacing:2px}
.diff-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.diff-chip{min-width:30px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;font-size:13px;font-weight:700;padding:0 4px}
.diff-chip.ok{background:#142014;border:1px solid var(--green);color:var(--green)}
.diff-chip.bad{background:#201414;border:1px solid var(--red);color:var(--red)}
.time-display{color:var(--muted);font-size:13px;margin-bottom:12px}
.time-display span{color:var(--gold);font-family:'Space Mono',monospace}

/* ── Mode toggle in header ── */
/* ── Ref ── */
.ref-section-title{color:var(--muted);font-size:11px;letter-spacing:1px;margin-bottom:10px;margin-top:20px}
.ref-section-title:first-child{margin-top:0}
.ref-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.ref-card{background:var(--bg3);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.ref-id{font-family:'Space Mono',monospace;font-size:11px;min-width:30px;color:var(--gold)}
.ref-id.edge{color:#a8d8a8}
.ref-stickers{display:flex;gap:6px}
.ref-sticker{text-align:center}
.ref-dot{width:18px;height:18px;border-radius:3px;margin-bottom:2px}
.ref-z{color:#aaa;font-size:13px}
.ref-memo{color:var(--muted2);font-size:11px;margin-left:auto}

.status-pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:6px}
.status-ok{background:#143a14;color:var(--green)}
.status-err{background:#3a1414;color:var(--red)}
.status-loading{background:#2a2a14;color:#aaa}

/* ── 3D Cube in Quiz ── */
#quiz-cube-wrap{width:100%;max-width:320px;margin:0 auto 18px;border-radius:14px;overflow:hidden;border:1px solid #ddd;background:#fff}
#quiz-cube-canvas{width:100%;display:block;touch-action:none}

/* ── Ref accordion ── */
.ref-group{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.ref-group-header{width:100%;background:var(--bg3);border:none;color:var(--gold);font-size:14px;font-family:'Space Mono',monospace;padding:10px 14px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ref-group-header:hover{background:#1a1a1a}
.ref-group-header .arrow{transition:transform .2s;font-size:10px;color:var(--muted)}
.ref-group-header.open .arrow{transform:rotate(180deg)}
.ref-group-body{display:none;padding:8px}
.ref-group-body.open{display:block}
.ref-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
/* ── Identify ── */
.id-sticker-hit{cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>BLD Trainer</h1>
      <div class="sub">3×3 盲解 · 3-style · 注音方案<span id="memo-status" class="status-pill status-loading">載入中...</span></div>
    </div>

  </header>

  <nav>
    <button class="nav-btn active" data-tab="recognition" onclick="setTab('recognition')"><span class="icon">◈</span>辨識</button>
    <button class="nav-btn" data-tab="identify" onclick="setTab('identify')"><span class="icon">◎</span>指認</button>
    <button class="nav-btn" data-tab="memo" onclick="setTab('memo')"><span class="icon">◉</span>Memo</button>
    <button class="nav-btn" data-tab="ref" onclick="setTab('ref')"><span class="icon">≡</span>參考表</button>
  </nav>

  <main>

    <!-- RECOGNITION -->
    <div id="tab-recognition">
      <div class="quiz-wrap">
        <div class="stats-bar">
          <span class="stat-c">✓ <span id="stat-correct">0</span></span>
          <span class="stat-w">✗ <span id="stat-wrong">0</span></span>
        </div>
        <div class="prompt-label">這組代號對應的名詞是？</div>
        <div class="zhuyin-pair" id="quiz-pair">—</div>
        <input class="word-input" id="quiz-input" placeholder="輸入名詞" autocomplete="off"
          oninput="onQuizInput()" onkeydown="onQuizKey(event)">
        <div class="result-area" id="quiz-result"></div>
        <div>
          <button class="btn-confirm" id="quiz-confirm" onclick="checkQuiz()" disabled>確認</button>
        </div>
        <div class="no-memo-note" id="quiz-no-memo"></div>
      </div>
      <div id="quiz-cube-wrap">
        <canvas id="quiz-cube-canvas"></canvas>
      </div>
    </div>

    <!-- IDENTIFY -->
    <div id="tab-identify" style="display:none">
      <div class="quiz-wrap">
        <div class="stats-bar">
          <span class="stat-c">✓ <span id="id-stat-correct">0</span></span>
          <span class="stat-w">✗ <span id="id-stat-wrong">0</span></span>
        </div>
        <div class="prompt-label">這個注音代號在方塊上的哪個位置？</div>
        <div class="zhuyin-pair" id="id-quiz-char">—</div>
        <div id="id-prompt-line" style="color:var(--muted);font-size:13px;margin-bottom:6px">請點出角塊與邊塊各一個貼片</div>
        <div id="id-result-area" style="min-height:44px;margin-bottom:10px;font-size:16px"></div>
      </div>
      <div id="id-cube-wrap" style="width:100%;max-width:320px;margin:0 auto 18px;border-radius:14px;overflow:hidden;border:1px solid #ddd;background:#fff">
        <canvas id="id-cube-canvas" style="width:100%;display:block;touch-action:none"></canvas>
      </div>
      <div style="text-align:center;padding-bottom:24px">
        <button class="btn-next" id="id-next-btn" onclick="idNextQuiz()" style="display:none">下一題 →</button>
      </div>
    </div>

    <!-- MEMO -->
    <div id="tab-memo" style="display:none">
      <div id="memo-phase-memo">
        <div class="timer-box"><div class="timer-label">記憶計時</div><div class="timer-value" id="timer-display">0.0s</div></div>
        <div id="memo-corner-section"><div class="seq-label">角塊序列</div><div class="pair-grid" id="corner-pairs"></div></div>
        <div id="memo-edge-section"><div class="seq-label">邊塊序列</div><div class="pair-grid" id="edge-pairs"></div></div>
        <button class="btn-danger" onclick="stopMemo()" style="margin-top:8px">記好了，遮住答案 →</button>
      </div>
      <div id="memo-phase-input" style="display:none">
        <div style="color:var(--muted);font-size:14px;margin-bottom:20px;text-align:center">輸入你記憶的注音序列：</div>
        <div id="memo-input-corner" class="memo-input-wrap">
          <label class="memo-input-label" id="corner-input-label">角塊</label>
          <input class="memo-input" id="input-corner" autocomplete="off">
        </div>
        <div id="memo-input-edge" class="memo-input-wrap">
          <label class="memo-input-label" id="edge-input-label">邊塊</label>
          <input class="memo-input" id="input-edge" autocomplete="off">
        </div>
        <button class="btn-primary" onclick="checkMemo()">驗證答案</button>
      </div>
      <div id="memo-phase-result" style="display:none">
        <div class="time-display">記憶時間：<span id="memo-time-result"></span></div>
        <div id="result-corner-section"><div class="seq-label">角塊結果</div><div class="diff-row" id="diff-corner"></div><div style="margin-bottom:16px"></div></div>
        <div id="result-edge-section"><div class="seq-label">邊塊結果</div><div class="diff-row" id="diff-edge"></div><div style="margin-bottom:20px"></div></div>
        <button class="btn-primary" onclick="showMemoPhase('memo')">再練一次 ⟳</button>
      </div>
    </div>

    <!-- REF -->
    <div id="tab-ref" style="display:none">
      <h2 style="font-family:'Crimson Pro',serif;font-size:20px;color:var(--gold);margin-bottom:16px">位置編碼參考表</h2>
      <div id="ref-accordion"></div>
    </div>

  </main>
</div>

// ── 辨識練習：建立題目池 ───────────────────────
// 題目 = 每一個注音「對組合」（2個注音的 pair），從 memoTable 的 key 來
// 但要過濾出屬於當前 pieceMode 的組合
function getAllPairs(){
  const pool=[], seen=new Set();
  function addPieces(pieces){
    pieces.forEach(p=>{
      for(let i=0;i<p.z.length;i++){
        for(let j=0;j<p.z.length;j++){
          if(i===j) continue;
          const key=p.z[i]+p.z[j];
          if(seen.has(key)) continue;
          seen.add(key);
          const word=memoTable[key];
          if(word) pool.push({pair:key, word});
        }
      }
    });
  }
  addPieces(CORNERS);
  addPieces(EDGES);
  return pool;
}

function nextQuiz(){
  const pool=getAllPairs();
  if(pool.length===0){
    document.getElementById("quiz-pair").textContent="—";
    document.getElementById("quiz-input").placeholder="等待記憶表載入...";
    document.getElementById("quiz-no-memo").textContent=
      Object.keys(memoTable).length===0 ? "記憶表尚未載入，請稍候" : "此模式無符合題目";
    return;
  }
  document.getElementById("quiz-input").placeholder="輸入名詞";
  document.getElementById("quiz-no-memo").textContent="";
  // avoid repeating same pair twice in a row
  let item;
  do { item=pool[Math.floor(Math.random()*pool.length)]; }
  while(pool.length>1 && quizCurrent && item.pair===quizCurrent.pair);
  quizCurrent=item;

  document.getElementById("quiz-pair").textContent=item.pair;
  document.getElementById("quiz-no-memo").textContent="";
  const inp=document.getElementById("quiz-input");
  inp.value=""; inp.className="word-input"; inp.disabled=false;
  document.getElementById("quiz-result").innerHTML="";
  document.getElementById("quiz-confirm").textContent="確認";
  document.getElementById("quiz-confirm").disabled=true;
  delete document.getElementById("quiz-confirm").dataset.done;
  document.getElementById("quiz-confirm").onclick=checkQuiz;
  highlightZhuyinPair(item.pair);
  setTimeout(()=>inp.focus(),50);
}

function onQuizInput(){
  document.getElementById("quiz-confirm").disabled=
    !document.getElementById("quiz-input").value.trim();
}
function onQuizKey(e){
  if(e.key!=="Enter") return;
  const btn=document.getElementById("quiz-confirm");
  if(!btn.disabled && !btn.dataset.done) checkQuiz();
  else if(btn.dataset.done) nextQuiz();
}
function checkQuiz(){
  const inp=document.getElementById("quiz-input");
  const val=inp.value.trim();
  const correct=quizCurrent.word;
  const ok=(val===correct);

  inp.classList.add(ok?"correct":"wrong");
  inp.disabled=true;
  stats[ok?"c":"w"]++;
  document.getElementById("stat-correct").textContent=stats.c;
  document.getElementById("stat-wrong").textContent=stats.w;

  const resultEl=document.getElementById("quiz-result");
  if(ok){
    resultEl.innerHTML=`<div class="result-correct">✓ 正確！</div>`;
  } else {
    resultEl.innerHTML=`<div class="result-wrong">✗ 答案是：<span class="result-answer">${correct}</span></div>`;
  }

  const btn=document.getElementById("quiz-confirm");
  btn.textContent="下一題 →"; btn.dataset.done="1"; btn.disabled=false;
  btn.onclick=nextQuiz;
}

// ── Memo ───────────────────────────────────────
function getSeq(pieces,buf){return pieces.filter(p=>p.id!==buf).map(p=>p.z[0]);}
function makePairs(seq){
  const r=[];
  for(let i=0;i<seq.length;i+=2){
    const a=seq[i],b=seq[i+1]||"";
    r.push({a,b,word:memoTable[a+b]||memoTable[b+a]||""});
  }
  return r;
}
function renderPairs(pairs,id){
  document.getElementById(id).innerHTML=pairs.map(p=>`
    <div class="pair-card">
      <div class="pair-zh">${p.a}${p.b}</div>
      ${p.word?`<div class="pair-word">${p.word}</div>`:""}
    </div>`).join("");
}
function startMemoTimer(){
  clearInterval(memoTimer);memoMs=0;
  memoTimer=setInterval(()=>{memoMs+=100;document.getElementById("timer-display").textContent=fmtTime(memoMs);},100);
}
function stopMemo(){
  clearInterval(memoTimer);memoFinalMs=memoMs;
  showMemoPhase("input");
  const cSeq=getSeq(CORNERS,CORNER_BUFFER),eSeq=getSeq(EDGES,EDGE_BUFFER);
  document.getElementById("corner-input-label").textContent=`角塊（${cSeq.length} 個注音）`;
  document.getElementById("edge-input-label").textContent=`邊塊（${eSeq.length} 個注音）`;
  setTimeout(()=>document.getElementById("input-corner")?.focus(),50);
}
function checkMemo(){
  showMemoPhase("result");
  document.getElementById("memo-time-result").textContent=fmtTime(memoFinalMs);
  const cSeq=getSeq(CORNERS,CORNER_BUFFER),eSeq=getSeq(EDGES,EDGE_BUFFER);
  renderDiff(cSeq,document.getElementById("input-corner").value,"diff-corner");
  renderDiff(eSeq,document.getElementById("input-edge").value,"diff-edge");

}
function renderDiff(correct,input,id){
  const tokens=[...input.replace(/\s/g,"")];
  document.getElementById(id).innerHTML=correct.map((z,i)=>
    `<span class="diff-chip ${tokens[i]===z?"ok":"bad"}">${z}</span>`).join("");
}
function showMemoPhase(phase){
  ["memo","input","result"].forEach(p=>
    document.getElementById(`memo-phase-${p}`).style.display=p===phase?"":"none");
  if(phase==="memo"){
    renderPairs(makePairs(getSeq(CORNERS,CORNER_BUFFER)),"corner-pairs");
    renderPairs(makePairs(getSeq(EDGES,EDGE_BUFFER)),"edge-pairs");

    document.getElementById("input-corner").value="";
    document.getElementById("input-edge").value="";
    startMemoTimer();
  }
}
function fmtTime(ms){const s=Math.floor(ms/1000);return`${Math.floor(s/60)?Math.floor(s/60)+"m ":""}${s%60}.${Math.floor((ms%1000)/100)}s`;}

// ── 參考表 accordion ────────────────────────────
function renderRef(){
  // Build lookup: zhuyin char → all pieces that have it
  const allPieces = [
    ...CORNERS.map(p=>({...p,kind:'corner'})),
    ...EDGES.map(p=>({...p,kind:'edge'}))
  ];

  // Group MEMO_DATA keys by first char
  const ZHUYIN_ORDER = ['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ','ㄧ','ㄨ','ㄩ'];
  const groups = {};
  ZHUYIN_ORDER.forEach(z=>{ groups[z]=[]; });
  for(const [key,word] of Object.entries(memoTable)){
    const first = key[0];
    if(groups[first]) groups[first].push({key,word});
  }

  const container = document.getElementById('ref-accordion');
  container.innerHTML = '';
  for(const z of ZHUYIN_ORDER){
    const items = groups[z];
    if(!items||!items.length) continue;
    const div = document.createElement('div');
    div.className = 'ref-group';
    const btn = document.createElement('button');
    btn.className = 'ref-group-header';
    btn.innerHTML = `<span>${z}（${items.length} 筆）</span><span class="arrow">▼</span>`;
    btn.onclick = ()=>{
      btn.classList.toggle('open');
      body.classList.toggle('open');
    };
    const body = document.createElement('div');
    body.className = 'ref-group-body';
    // Find sticker info for each key
    const cards = items.map(({key,word})=>{
      // find which piece+sticker index matches each char
      const stickers = [...key].map(ch=>{
        for(const p of allPieces){
          const idx = p.z.indexOf(ch);
          if(idx>=0) return {face:p.faces[idx],ch,pid:p.id};
        }
        return null;
      }).filter(Boolean);
      const dots = stickers.map(s=>`
        <div class="ref-sticker">
          <div class="ref-dot" style="background:${FACE_COLOR[s.face]}"></div>
          <div class="ref-z">${s.ch}</div>
        </div>`).join('');
      return `<div class="ref-card">
        <span class="ref-id" style="font-size:13px;letter-spacing:2px">${key}</span>
        <div class="ref-stickers">${dots}</div>
        <span class="ref-memo">${word}</span>
      </div>`;
    }).join('');
    const grid = document.createElement('div');
    grid.className = 'ref-grid';
    grid.innerHTML = cards;
    body.appendChild(grid);
    div.appendChild(btn);
    div.appendChild(body);
    container.appendChild(div);
  }
}

// ── 3D Cube for Quiz ────────────────────────────
// Sticker position lookup: for each (face, sticker_index_on_face), 
// return the {x,y,z} of the cubie and which BoxGeometry face index it's on
// Face indices in BoxGeometry: +x=0(R), -x=1(L), +y=2(U), -y=3(D), +z=4(F), -z=5(B)
// CORNERS layout: UFR=z[0..2] → faces[U,F,R]
// For face U: row=(1-z_coord), col=(x_coord+1)  → sticker index = row*3+col
// We need to reverse: given face name and sticker index → cubie (x,y,z)

// Build a map: zhuyin_char → [{cubiePos:{x,y,z}, faceIdx}]
let ZHUYIN_STICKER_MAP = null;
function buildStickerMap(){
  if(ZHUYIN_STICKER_MAP) return;
  ZHUYIN_STICKER_MAP = {};
  const FI = {R:0,L:1,U:2,D:3,F:4,B:5}; // BoxGeometry face indices

  // For each piece, each sticker: compute cubie position
  const allPieces = [
    ...CORNERS.map(p=>({...p,kind:'corner'})),
    ...EDGES.map(p=>({...p,kind:'edge'}))
  ];

  allPieces.forEach(p=>{
    p.z.forEach((zh, si)=>{
      const face = p.faces[si];
      // Determine cubie x,y,z from piece id
      const id = p.id;
      const cx = id.includes('R')?1 : id.includes('L')?-1 : 0;
      const cy = id.includes('U')?1 : id.includes('D')?-1 : 0;
      const cz = id.includes('F')?1 : id.includes('B')?-1 : 0;
      if(!ZHUYIN_STICKER_MAP[zh]) ZHUYIN_STICKER_MAP[zh]=[];
      ZHUYIN_STICKER_MAP[zh].push({cx,cy,cz,face,faceIdx:FI[face]});
    });
  });
}

let qRenderer=null, qAF=null, qScene=null, qCam=null;
let qDragging=false, qPrevX=0, qPrevY=0, qRotX=0.5, qRotY=0.0;
let qCubies=[]; // {mesh, cx,cy,cz}

function initQuizCube(){
  buildStickerMap();
  const canvas = document.getElementById('quiz-cube-canvas');
  const wrap = document.getElementById('quiz-cube-wrap');
  if(!window.THREE){ wrap.style.display='none'; return; }
  const T = window.THREE;

  if(qRenderer){ cancelAnimationFrame(qAF); qRenderer.dispose(); }

  const W = wrap.clientWidth||320;
  const H = Math.round(W*0.72);
  canvas.width = W; canvas.height = H;
  canvas.style.height = H+'px';

  qScene = new T.Scene(); qScene.background = new T.Color(0xffffff);
  qCam = new T.PerspectiveCamera(42, W/H, 0.1, 100);
  qCam.position.set(4.2, 3.6, 4.2); qCam.lookAt(0,0,0);
  qRenderer = new T.WebGLRenderer({canvas, antialias:true});
  qRenderer.setSize(W,H); qRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  // Build cube
  const COLS = {U:0xf0f0f0,D:0xf5c518,F:0x2d9e4f,B:0x457b9d,R:0xe63946,L:0xff7b1c};
  const FI_BOX = {R:0,L:1,U:2,D:3,F:4,B:5};
  qCubies = [];
  const grp = new T.Group();

  for(let x=-1;x<=1;x++) for(let y=-1;y<=1;y++) for(let z=-1;z<=1;z++){
    if(!x&&!y&&!z) continue;
    const isCenterPiece = (x===0&&y===0)||(x===0&&z===0)||(y===0&&z===0);
    const geo = new T.BoxGeometry(0.93,0.93,0.93);
    const mats = Array(6).fill(null).map(()=>
      new T.MeshStandardMaterial({color:0x181818,transparent:true,opacity:0.15,roughness:0.6})
    );
    const asgn=[x===1?'R':null,x===-1?'L':null,y===1?'U':null,y===-1?'D':null,z===1?'F':null,z===-1?'B':null];
    asgn.forEach((face,i)=>{
      if(!face) return;
      if(isCenterPiece){
        // Center stickers: always full brightness
        mats[i] = new T.MeshStandardMaterial({
          color: COLS[face], transparent:false, opacity:1.0, roughness:0.3
        });
      } else {
        // Edge/corner stickers: start dim
        mats[i] = new T.MeshStandardMaterial({
          color: COLS[face], transparent:true, opacity:0.22, roughness:0.4
        });
      }
    });
    const mesh = new T.Mesh(geo,mats);
    mesh.position.set(x*1.02,y*1.02,z*1.02);
    grp.add(mesh);
    // Only track non-center pieces for highlight toggling
    if(!isCenterPiece) qCubies.push({mesh,cx:x,cy:y,cz:z,mats,asgn});
  }
  qScene.add(grp);
  qScene.add(new T.AmbientLight(0xffffff,0.7));
  const dl=new T.DirectionalLight(0xffffff,0.9);dl.position.set(5,8,5);qScene.add(dl);

  // Drag
  const md=e=>{qDragging=true;qPrevX=e.clientX||e.touches[0].clientX;qPrevY=e.clientY||e.touches[0].clientY;};
  const mm=e=>{
    if(!qDragging)return;
    const cx=e.clientX||(e.touches&&e.touches[0].clientX)||qPrevX;
    const cy2=e.clientY||(e.touches&&e.touches[0].clientY)||qPrevY;
    qRotY+=(cx-qPrevX)*0.012; qRotX+=(cy2-qPrevY)*0.012;

    qPrevX=cx;qPrevY=cy2;
  };
  const mu=()=>{qDragging=false;};
  canvas.addEventListener('mousedown',md);
  window.addEventListener('mousemove',mm);
  window.addEventListener('mouseup',mu);
  canvas.addEventListener('touchstart',e=>{md(e);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',e=>{mm(e);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',mu);

  const animate=()=>{
    qAF=requestAnimationFrame(animate);
    grp.rotation.x=qRotX; grp.rotation.y=qRotY;
    qRenderer.render(qScene,qCam);
  };
  animate();
}

function highlightZhuyinPair(pair){
  if(!qCubies.length||!ZHUYIN_STICKER_MAP) return;
  const T=window.THREE;
  const COLS={U:0xf0f0f0,D:0xffd200,F:0x2d9e4f,B:0x457b9d,R:0xe63946,L:0xff7b1c};

  // Gather all highlighted stickers: {cx,cy,cz,faceIdx}
  const highlighted = new Set();
  for(const ch of pair){
    const stickers = ZHUYIN_STICKER_MAP[ch]||[];
    stickers.forEach(s=>highlighted.add(`${s.cx},${s.cy},${s.cz},${s.faceIdx}`));
  }

  qCubies.forEach(({cx,cy,cz,mats,asgn})=>{
    asgn.forEach((face,i)=>{
      if(!face) return;
      const key=`${cx},${cy},${cz},${i}`;
      const isHit = highlighted.has(key);
      mats[i].color.setHex(isHit ? COLS[face] : 0x111111);
      mats[i].opacity = isHit ? 1.0 : 0.15;
      mats[i].emissive = isHit ? new T.Color(COLS[face]).multiplyScalar(0.3) : new T.Color(0x000000);
    });
  });
}


// ── 指認 (Identify) ──────────────────────────────
let idStats={c:0,w:0};
let idCurrent=null; // {char, targets:[cornerTarget, edgeTarget]}
let idAnswered=false;

let idRenderer=null, idAF=null, idScene=null, idCam=null;
let idDragging=false, idPrevX=0, idPrevY=0, idRotX=0.5, idRotY=0.0;
let idCubies=[]; // {mesh,cx,cy,cz,mats,asgn}
let idGroup=null;

const ID_COLS_HEX={U:0xf0f0f0,D:0xf5c518,F:0x2d9e4f,B:0x457b9d,R:0xe63946,L:0xff7b1c};
const ID_COLS_CSS={U:"#f0f0f0",D:"#f5c518",F:"#2d9e4f",B:"#457b9d",R:"#e63946",L:"#ff7b1c"};

function initIdentifyCube(){
  buildStickerMap();
  const canvas=document.getElementById('id-cube-canvas');
  const wrap=document.getElementById('id-cube-wrap');
  if(!window.THREE){wrap.style.display='none';return;}
  const T=window.THREE;

  if(idRenderer){cancelAnimationFrame(idAF);idRenderer.dispose();}

  const W=wrap.clientWidth||320;
  const H=Math.round(W*0.72);
  canvas.width=W;canvas.height=H;canvas.style.height=H+'px';

  idScene=new T.Scene();idScene.background=new T.Color(0xffffff);
  idCam=new T.PerspectiveCamera(42,W/H,0.1,100);
  idCam.position.set(4.2,3.6,4.2);idCam.lookAt(0,0,0);
  idRenderer=new T.WebGLRenderer({canvas,antialias:true});
  idRenderer.setSize(W,H);idRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  idCubies=[];
  idGroup=new T.Group();

  for(let x=-1;x<=1;x++) for(let y=-1;y<=1;y++) for(let z=-1;z<=1;z++){
    if(!x&&!y&&!z) continue;
    const isCenterPiece=(x===0&&y===0)||(x===0&&z===0)||(y===0&&z===0);
    const geo=new T.BoxGeometry(0.93,0.93,0.93);
    const mats=Array(6).fill(null).map(()=>
      new T.MeshStandardMaterial({color:0x181818,transparent:true,opacity:0.15,roughness:0.6})
    );
    const asgn=[x===1?'R':null,x===-1?'L':null,y===1?'U':null,y===-1?'D':null,z===1?'F':null,z===-1?'B':null];
    asgn.forEach((face,i)=>{
      if(!face) return;
      if(isCenterPiece){
        mats[i]=new T.MeshStandardMaterial({color:ID_COLS_HEX[face],transparent:false,opacity:1.0,roughness:0.3});
      } else {
        // dim initially — will be lit up when hovered/clicked
        mats[i]=new T.MeshStandardMaterial({color:ID_COLS_HEX[face],transparent:true,opacity:0.22,roughness:0.4});
      }
    });
    const mesh=new T.Mesh(geo,mats);
    mesh.position.set(x*1.02,y*1.02,z*1.02);
    idGroup.add(mesh);
    if(!isCenterPiece) idCubies.push({mesh,cx:x,cy:y,cz:z,mats,asgn});
  }
  idScene.add(idGroup);
  idScene.add(new T.AmbientLight(0xffffff,0.7));
  const dl=new T.DirectionalLight(0xffffff,0.9);dl.position.set(5,8,5);idScene.add(dl);

  // Raycaster for click detection
  const raycaster=new T.Raycaster();
  const mouse=new T.Vector2();

  function getCanvasXY(e){
    const rect=canvas.getBoundingClientRect();
    const cx2=(e.clientX||e.touches[0].clientX)-rect.left;
    const cy2=(e.clientY||e.touches[0].clientY)-rect.top;
    return [cx2,cy2];
  }

  // Drag
  let idMouseDown=false;
  const md=e=>{
    idMouseDown=true;
    idDragging=false;
    const [x2,y2]=getCanvasXY(e);
    idPrevX=x2;idPrevY=y2;
  };
  const mm=e=>{
    if(!idMouseDown) return;
    const [x2,y2]=getCanvasXY(e);
    const dx=x2-idPrevX, dy=y2-idPrevY;
    if(Math.abs(dx)>2||Math.abs(dy)>2) idDragging=true;
    if(!idDragging) return;
    idRotY+=dx*0.012; idRotX+=dy*0.012;
    idPrevX=x2; idPrevY=y2;
  };
  const mu=e=>{
    idMouseDown=false;
    if(idDragging){idDragging=false;return;}
    if(idAnswered) return;
    // Click → raycast
    const rect=canvas.getBoundingClientRect();
    const ex=e.clientX||(e.changedTouches&&e.changedTouches[0].clientX);
    const ey=e.clientY||(e.changedTouches&&e.changedTouches[0].clientY);
    mouse.x=((ex-rect.left)/rect.width)*2-1;
    mouse.y=-((ey-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse,idCam);

    // Collect all face meshes with their cubie info
    const meshes=idCubies.map(c=>c.mesh);
    const hits=raycaster.intersectObjects(meshes);
    if(!hits.length) return;

    const hit=hits[0];
    const faceIndex=Math.floor(hit.faceIndex/2); // BoxGeometry: 2 triangles per face
    const mesh=hit.object;
    const cubie=idCubies.find(c=>c.mesh===mesh);
    if(!cubie) return;

    handleIdentifyClick(cubie, faceIndex);
  };

  canvas.addEventListener('mousedown',md);
  canvas.addEventListener('mousemove',mm);
  canvas.addEventListener('mouseup',mu);
  canvas.addEventListener('touchstart',e=>{idMouseDown=true;md(e);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',e=>{mm(e);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',e=>{idMouseDown=false;mu(e);e.preventDefault();},{passive:false});

  const animate=()=>{
    idAF=requestAnimationFrame(animate);
    idGroup.rotation.x=idRotX;idGroup.rotation.y=idRotY;
    idRenderer.render(idScene,idCam);
  };
  animate();
}

// idDone[0]=角塊已答, idDone[1]=邊塊已答
let idDone=[false,false];

function handleIdentifyClick(cubie, faceIndex){
  if(!idCurrent || idAnswered) return;
  const T=window.THREE;
  const targets=idCurrent.targets; // [cornerTarget, edgeTarget]

  // 判斷點到的是哪個 target（忽略已答的）
  let hitIdx=-1;
  for(let i=0;i<2;i++){
    if(idDone[i]) continue;
    const t=targets[i];
    if(cubie.cx===t.cx && cubie.cy===t.cy && cubie.cz===t.cz && faceIndex===t.faceIdx){
      hitIdx=i; break;
    }
  }

  if(hitIdx===-1){
    // 答錯：閃紅後恢復
    idStats.w++;
    document.getElementById("id-stat-wrong").textContent=idStats.w;
    const cm=cubie.mats[faceIndex];
    const saveHex=cm.color.getHex(), saveOp=cm.opacity;
    cm.color.setHex(0xff3333); cm.opacity=1.0;
    cm.emissive=new T.Color(0xff3333).multiplyScalar(0.5);
    setTimeout(()=>{ cm.color.setHex(saveHex); cm.opacity=saveOp; cm.emissive.set(0x000000); },400);
    idRenderStatus();
    return;
  }

  // 答對
  idStats.c++;
  document.getElementById("id-stat-correct").textContent=idStats.c;
  idDone[hitIdx]=true;

  const t=targets[hitIdx];
  const cm=cubie.mats[faceIndex];
  cm.color.setHex(ID_COLS_HEX[t.faceName]);
  cm.opacity=1.0;
  cm.emissive=new T.Color(0x44ff88).multiplyScalar(0.5);

  idRenderStatus();

  if(idDone[0] && idDone[1]){
    idAnswered=true;
    document.getElementById("id-next-btn").style.display="inline-block";
  }
}

function idRenderStatus(){
  const resultEl=document.getElementById("id-result-area");
  const labels=["角塊","邊塊"];
  resultEl.innerHTML=idCurrent.targets.map((t,i)=>{
    if(idDone[i])
      return `<div class="result-correct">✓ ${labels[i]} — ${t.pieceId} (${t.faceName}面)</div>`;
    else
      return `<div style="color:var(--muted);font-size:13px;margin:2px 0">◯ ${labels[i]} — 尚未指出</div>`;
  }).join("");
}

function idResetCubeColors(){
  if(!idCubies.length) return;
  const T=window.THREE;
  idCubies.forEach(({mats,asgn})=>{
    asgn.forEach((face,i)=>{
      if(!face) return;
      mats[i].color.setHex(ID_COLS_HEX[face]);
      mats[i].opacity=0.22;
      if(mats[i].emissive) mats[i].emissive.set(0x000000);
    });
  });
}

function idNextQuiz(){
  buildStickerMap();
  const FI={R:0,L:1,U:2,D:3,F:4,B:5};

  // 建立每個注音字 → corner + edge 對應
  const charMap={};
  CORNERS.forEach(p=>{
    p.z.forEach((zh,si)=>{
      if(!charMap[zh]) charMap[zh]={};
      const cx=p.id.includes('R')?1:p.id.includes('L')?-1:0;
      const cy=p.id.includes('U')?1:p.id.includes('D')?-1:0;
      const cz=p.id.includes('F')?1:p.id.includes('B')?-1:0;
      charMap[zh].corner={char:zh,kind:"corner",pieceId:p.id,faceName:p.faces[si],faceIdx:FI[p.faces[si]],cx,cy,cz};
    });
  });
  EDGES.forEach(p=>{
    p.z.forEach((zh,si)=>{
      if(!charMap[zh]) charMap[zh]={};
      const cx=p.id.includes('R')?1:p.id.includes('L')?-1:0;
      const cy=p.id.includes('U')?1:p.id.includes('D')?-1:0;
      const cz=p.id.includes('F')?1:p.id.includes('B')?-1:0;
      charMap[zh].edge={char:zh,kind:"edge",pieceId:p.id,faceName:p.faces[si],faceIdx:FI[p.faces[si]],cx,cy,cz};
    });
  });

  // 只出有角塊又有邊塊的注音字
  const pool=Object.entries(charMap)
    .filter(([,v])=>v.corner&&v.edge)
    .map(([ch,v])=>({char:ch, targets:[v.corner, v.edge]}));

  let item;
  do { item=pool[Math.floor(Math.random()*pool.length)]; }
  while(pool.length>1 && idCurrent && item.char===idCurrent.char);

  idCurrent=item;
  idAnswered=false;
  idDone=[false,false];

  document.getElementById("id-quiz-char").textContent=item.char;
  document.getElementById("id-next-btn").style.display="none";
  idResetCubeColors();
  idRenderStatus();
}

// ── UI ─────────────────────────────────────────
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  ["recognition","identify","memo","ref"].forEach(t=>
    document.getElementById(`tab-${t}`).style.display=t===tab?"":"none");
  if(tab==="recognition") nextQuiz();
  if(tab==="identify") idNextQuiz();
  if(tab==="memo") showMemoPhase("memo");
  if(tab==="ref") renderRef();
}

window.addEventListener("DOMContentLoaded",()=>{
  renderRef();
  fetchMemoTable();
  initQuizCube();
  initIdentifyCube();
  nextQuiz();
});
